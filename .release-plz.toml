[workspace]
# Disable cargo-semver-checks — we control versioning manually for this fork.
# Without this, adding enum variants or #[non_exhaustive] triggers major bumps.
semver_check = false
# Create GitHub releases with changelog
git_release_enable = true
# Use conventional commits for changelog
changelog_update = true
# Fork tags use v-prefix (v4.0.0) to distinguish from upstream (3.1.2)
git_tag_name = "v{{ version }}"

[changelog]
# Keep changelog focused on meaningful changes.
#
# What SKIPS changelog (no user-visible impact):
#   chore:    maintenance, deps, tooling, release machinery
#   ci:       CI/CD workflows, GitHub Actions
#   style:    formatting, whitespace, no code change
#   build:    build system, Cargo.toml tweaks
#   docs(ci): CI-related documentation
#   docs(copilot): AI assistant instructions
#   Merge:    merge commits from upstream sync
#
# What ENTERS changelog (user-visible):
#   feat:     new feature, new API        → "Added"
#   fix:      bug fix, correctness fix    → "Fixed"
#   perf:     performance improvement     → "Performance"
#   refactor: code restructuring          → "Refactored"
#   test:     new tests, test infra       → "Testing"
#   docs:     documentation changes       → "Documentation"
#
commit_parsers = [
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^style", skip = true },
    { message = "^build", skip = true },
    { message = "^docs\\(ci\\)", skip = true },
    { message = "^docs\\(copilot\\)", skip = true },
    { message = "^Merge", skip = true },
    { message = "^docs", group = "Documentation" },
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactored" },
    { message = "^test", group = "Testing" },
]
